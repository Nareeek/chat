services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      APP_NAME: Missenger
      APP_ENV: local
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: chat
      DB_USERNAME: chat
      DB_PASSWORD: chat
      BROADCAST_DRIVER: pusher
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      REDIS_HOST: redis
      PUSHER_APP_ID: chat-app
      PUSHER_APP_KEY: chat-key
      PUSHER_APP_SECRET: chat-secret
      PUSHER_APP_CLUSTER: mt1
      PUSHER_HOST: soketi
      PUSHER_PORT: 6001
      PUSHER_SCHEME: http
      MIX_PUSHER_APP_KEY: chat-key
      MIX_PUSHER_APP_CLUSTER: mt1
      MIX_PUSHER_HOST: localhost
      MIX_PUSHER_PORT: 6001
      MIX_PUSHER_SCHEME: http
      AI_ASSISTANT_ENABLED: "true"
    depends_on:
      - mysql
      - redis
      - soketi

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - vendor:/var/www/html/vendor:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: chat
      MYSQL_USER: chat
      MYSQL_PASSWORD: chat
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine

  soketi:
    image: quay.io/soketi/soketi:1.6-16-alpine
    ports:
      - "6001:6001"
    environment:
      SOKETI_DEBUG: "1"
      SOKETI_DEFAULT_APP_ID: chat-app
      SOKETI_DEFAULT_APP_KEY: chat-key
      SOKETI_DEFAULT_APP_SECRET: chat-secret

  assets:
    image: node:18-alpine
    working_dir: /var/www/html
    command: sh -lc "npm install --no-package-lock && npm run watch"
    volumes:
      - ./:/var/www/html
      - node-modules:/var/www/html/node_modules
    environment:
      MIX_PUSHER_APP_KEY: chat-key
      MIX_PUSHER_APP_CLUSTER: mt1
      MIX_PUSHER_HOST: localhost
      MIX_PUSHER_PORT: 6001
      MIX_PUSHER_SCHEME: http

volumes:
  vendor:
  node-modules:
  mysql-data:
